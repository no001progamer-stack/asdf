<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ラケット診断 - 試打 × AIフォーム分析</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
*, *::before, *::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#ffffff;
  --bg2:#f5f5f3;
  --bg3:#efefec;
  --text:#1a1a19;
  --text2:#6b6b67;
  --text3:#9e9d98;
  --border:rgba(0,0,0,0.12);
  --border2:rgba(0,0,0,0.22);

  --radius-md:8px;
  --radius-lg:12px;

  --purple:#534AB7;
  --purple-light:#EEEDFE;
  --purple-text:#3C3489;

  --teal:#1D9E75;
  --teal-light:#E1F5EE;
  --teal-text:#085041;

  --amber-light:#FAEEDA;
  --amber-text:#633806;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg3);
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:24px 16px;
}

.container{
  width:100%;
  max-width:480px;
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:1.5rem;
}

.logo{
  width:36px;
  height:36px;
  background:var(--purple);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo i{
  color:white;
  font-size:20px;
}

.header-title{
  font-size:17px;
  font-weight:600;
}

.header-sub{
  font-size:13px;
  color:var(--text2);
}

.step-row{
  display:flex;
  align-items:center;
  margin-bottom:1.5rem;
}

.step{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  flex:1;
  cursor:pointer;
}

.step-circle{
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:600;
  border:1px solid var(--border);
  background:var(--bg2);
  color:var(--text3);
}

.step-circle.active{
  background:var(--purple);
  color:white;
  border-color:var(--purple);
}

.step-circle.done{
  background:var(--teal);
  color:white;
  border-color:var(--teal);
}

.step-label{
  font-size:11px;
  color:var(--text3);
}

.step-label.active{
  color:var(--purple);
  font-weight:600;
}

.step-label.done{
  color:var(--teal-text);
}

.step-line{
  flex:1;
  height:1px;
  background:var(--border);
  margin-bottom:16px;
}

.step-line.done{
  background:var(--teal);
}

.screen{
  display:none;
}

.screen.active{
  display:block;
}

.section-label{
  font-size:12px;
  color:var(--text2);
  margin-bottom:8px;
  letter-spacing:0.04em;
  text-transform:uppercase;
}

.field{
  margin-bottom:1.25rem;
}

.field label{
  display:block;
  margin-bottom:6px;
  font-size:13px;
  color:var(--text2);
}

input[type="text"]{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border2);
  border-radius:8px;
  font-size:14px;
  background:var(--bg);
  color:var(--text);
  outline:none;
}

input[type="text"]:focus{
  border-color:var(--purple);
}

.shaft-group,
.balance-group{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:1.25rem;
}

.shaft-opt,
.bal-opt{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 10px;
  text-align:center;
  cursor:pointer;
  background:var(--bg);
}

.shaft-opt.selected{
  border:2px solid var(--purple);
  background:var(--purple-light);
}

.bal-opt.selected{
  border:2px solid var(--teal);
  background:var(--teal-light);
}

.shaft-icon{
  font-size:22px;
  margin-bottom:6px;
  display:block;
}

.shaft-name,
.bal-name{
  font-size:13px;
  font-weight:600;
}

.shaft-desc,
.bal-sub{
  font-size:11px;
  color:var(--text2);
  margin-top:4px;
}

.weight-group{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:1.25rem;
}

.weight-chip{
  padding:6px 14px;
  border-radius:999px;
  border:1px solid var(--border);
  background:var(--bg2);
  cursor:pointer;
  font-size:12px;
}

.weight-chip.selected{
  background:var(--amber-light);
  color:var(--amber-text);
}

.preview-card,
.compare-table,
.result-card{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  margin-bottom:1rem;
}

.preview-row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
}

.preview-row:not(:last-child){
  border-bottom:1px solid var(--border);
}

.preview-key{
  color:var(--text2);
  font-size:13px;
}

.preview-val{
  font-size:13px;
  font-weight:600;
}

.tag{
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
}

.tag-purple{
  background:var(--purple-light);
  color:var(--purple-text);
}

.tag-green{
  background:var(--teal-light);
  color:var(--teal-text);
}

.tag-amber{
  background:var(--amber-light);
  color:var(--amber-text);
}

.reg-card{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.reg-icon{
  width:32px;
  height:32px;
  border-radius:8px;
  background:var(--purple-light);
  display:flex;
  align-items:center;
  justify-content:center;
}

.reg-del{
  background:none;
  border:none;
  cursor:pointer;
  font-size:18px;
}

.btn-primary,
.btn-secondary,
.nav-btn,
.nav-btn-primary{
  width:100%;
  padding:11px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.btn-primary,
.nav-btn-primary{
  background:var(--purple);
  color:white;
}

.btn-secondary,
.nav-btn{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--text);
}

.upload-area{
  border:2px dashed var(--border2);
  border-radius:12px;
  padding:2rem;
  text-align:center;
  margin-bottom:1rem;
  cursor:pointer;
}

.upload-area i{
  font-size:32px;
  margin-bottom:8px;
}

.video-card{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:1rem;
}

.video-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 14px;
}

.vframe{
  height:160px;
  background:#1a1a1a;
  display:flex;
  align-items:center;
  justify-content:center;
}

.vframe i{
  font-size:40px;
  color:rgba(255,255,255,0.3);
}

.racket-tabs{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:1rem;
}

.rtab{
  padding:5px 12px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  font-size:12px;
}

.rtab.active{
  background:var(--purple-light);
}

.rtab.done-tab{
  background:var(--teal-light);
}

.loading-box{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:10px;
  padding:2rem;
}

.spinner{
  width:30px;
  height:30px;
  border:3px solid var(--border);
  border-top-color:var(--purple);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

.lstep{
  font-size:12px;
  color:var(--text3);
  margin-bottom:6px;
}

.lstep.active{
  color:var(--text);
}

.lstep.done{
  color:var(--teal);
}

.score-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:1rem;
}

.sc{
  background:var(--bg2);
  border-radius:8px;
  padding:10px;
  text-align:center;
}

.sc-label{
  font-size:11px;
  color:var(--text2);
}

.sc-num{
  font-size:22px;
  font-weight:700;
}

.fb{
  display:flex;
  gap:8px;
  padding:10px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  margin-bottom:8px;
}

.fb-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  margin-top:6px;
}

.fb-dot-g{background:#1D9E75;}
.fb-dot-o{background:#EF9F27;}

.nav-row{
  display:flex;
  gap:8px;
}

.ct-grid{
  display:grid;
  grid-template-columns:90px repeat(3,1fr);
  gap:6px;
}

.ct-head{
  font-size:11px;
  text-align:center;
  font-weight:600;
}

.ct-label{
  font-size:12px;
}

.ct-val{
  text-align:center;
  font-size:13px;
  font-weight:600;
}

.bar-wrap{
  height:5px;
  background:var(--bg2);
  border-radius:999px;
  overflow:hidden;
}

.bar{
  height:100%;
}

.ba{background:#7F77DD;}
.bb{background:#1D9E75;}
.bc{background:#EF9F27;}

.result-card{
  border:2px solid var(--purple);
}

.result-badge{
  display:inline-block;
  margin-bottom:8px;
  padding:4px 10px;
  border-radius:999px;
  background:var(--purple-light);
  color:var(--purple-text);
  font-size:11px;
  font-weight:600;
}

.result-name{
  font-size:16px;
  font-weight:700;
  margin-bottom:6px;
}

.result-reason{
  font-size:13px;
  line-height:1.6;
  color:var(--text2);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">
    <i class="ti ti-tournament"></i>
  </div>

  <div>
    <div class="header-title">ラケット診断</div>
    <div class="header-sub">
      試打 × AIフォーム分析で最適な1本を
    </div>
  </div>
</div>

<div class="step-row">

  <div class="step" onclick="goStep(1)">
    <div class="step-circle active" id="sc1">1</div>
    <div class="step-label active" id="sl1">ラケット登録</div>
  </div>

  <div class="step-line" id="line1"></div>

  <div class="step" onclick="goStep(2)">
    <div class="step-circle" id="sc2">2</div>
    <div class="step-label" id="sl2">試打・分析</div>
  </div>

  <div class="step-line" id="line2"></div>

  <div class="step" onclick="goStep(3)">
    <div class="step-circle" id="sc3">3</div>
    <div class="step-label" id="sl3">比較・診断</div>
  </div>

</div>

<!-- SCREEN 1 -->

<div class="screen active" id="screen1">

  <div class="field">
    <label>ラケット名</label>

    <input
      type="text"
      id="rname"
      placeholder="例：YONEX ASTROX 88D Pro"
      oninput="handleNameInput()"
    >
  </div>

  <div class="section-label">シャフトの硬さ</div>

  <div class="shaft-group">

    <div class="shaft-opt" id="shaft-soft" onclick="selectShaft('soft')">
      <i class="ti ti-wave-sine shaft-icon"></i>
      <div class="shaft-name">やわらかめ</div>
      <div class="shaft-desc">初心者向け</div>
    </div>

    <div class="shaft-opt" id="shaft-mid" onclick="selectShaft('mid')">
      <i class="ti ti-activity shaft-icon"></i>
      <div class="shaft-name">ふつう</div>
      <div class="shaft-desc">オールラウンド</div>
    </div>

    <div class="shaft-opt selected" id="shaft-hard" onclick="selectShaft('hard')">
      <i class="ti ti-bolt shaft-icon"></i>
      <div class="shaft-name">かたい</div>
      <div class="shaft-desc">上級者向け</div>
    </div>

  </div>

  <div class="section-label">バランス</div>

  <div class="balance-group">

    <div class="bal-opt" id="bal-head" onclick="selectBal('head')">
      <div class="bal-name">ヘッドヘビー</div>
      <div class="bal-sub">パワー重視</div>
    </div>

    <div class="bal-opt selected" id="bal-even" onclick="selectBal('even')">
      <div class="bal-name">イーブン</div>
      <div class="bal-sub">万能型</div>
    </div>

    <div class="bal-opt" id="bal-handle" onclick="selectBal('handle')">
      <div class="bal-name">ハンドルヘビー</div>
      <div class="bal-sub">操作性重視</div>
    </div>

  </div>

  <div class="section-label">重量</div>

  <div class="weight-group">
    <span class="weight-chip" id="w2U" onclick="selectWeight('2U')">2U</span>
    <span class="weight-chip" id="w3U" onclick="selectWeight('3U')">3U</span>
    <span class="weight-chip selected" id="w4U" onclick="selectWeight('4U')">4U</span>
    <span class="weight-chip" id="w5U" onclick="selectWeight('5U')">5U</span>
  </div>

  <div class="section-label">プレビュー</div>

  <div class="preview-card">

    <div class="preview-row">
      <span class="preview-key">名前</span>
      <span class="preview-val" id="prev-name">未入力</span>
    </div>

    <div class="preview-row">
      <span class="preview-key">シャフト</span>
      <span id="prev-shaft"></span>
    </div>

    <div class="preview-row">
      <span class="preview-key">バランス</span>
      <span id="prev-bal"></span>
    </div>

    <div class="preview-row">
      <span class="preview-key">重量</span>
      <span id="prev-weight"></span>
    </div>

  </div>

  <button class="btn-primary" onclick="addRacket()">
    ラケット追加
  </button>

  <div id="reg-section" style="display:none">

    <div class="section-label">
      登録済み
    </div>

    <div id="reg-list"></div>

  </div>

  <button
    class="btn-secondary"
    id="goto-step2"
    style="display:none"
    onclick="goStep(2)"
  >
    試打分析へ
  </button>

</div>

<!-- SCREEN 2 -->

<div class="screen" id="screen2">

  <div class="section-label">試打動画</div>

  <div class="racket-tabs" id="racket-tabs"></div>

  <div class="upload-area" id="upload-area" onclick="simulateUpload()">
    <i class="ti ti-video-plus"></i>

    <div id="upload-label">
      動画をアップロード
    </div>
  </div>

  <div class="video-card" id="vcard" style="display:none">

    <div class="video-bar">
      <div id="vcard-name">video.mp4</div>
      <i class="ti ti-check"></i>
    </div>

    <div class="vframe">
      <i class="ti ti-player-play"></i>
    </div>

  </div>

  <button
    class="btn-primary"
    id="analyze-btn"
    onclick="startAnalysis()"
    disabled
  >
    AI分析
  </button>

  <div class="loading-box" id="lbox">

    <div class="spinner"></div>

    <div>

      <div class="lstep" id="ls1">
        姿勢検出中...
      </div>

      <div class="lstep" id="ls2">
        スイング速度解析中...
      </div>

      <div class="lstep" id="ls3">
        スコア計算中...
      </div>

      <div class="lstep" id="ls4">
        AI照合中...
      </div>

    </div>

  </div>

  <div id="result-panel" style="display:none">

    <div class="score-grid">

      <div class="sc">
        <div class="sc-label">総合</div>
        <div class="sc-num" id="rs-total">0</div>
      </div>

      <div class="sc">
        <div class="sc-label">速度</div>
        <div class="sc-num" id="rs-speed">0</div>
      </div>

      <div class="sc">
        <div class="sc-label">安定性</div>
        <div class="sc-num" id="rs-stable">0</div>
      </div>

    </div>

    <div id="fb-list"></div>

    <div class="nav-row">

      <button class="nav-btn" onclick="nextRacket()">
        次へ
      </button>

      <button class="nav-btn-primary" onclick="goStep(3)">
        比較へ
      </button>

    </div>

  </div>

</div>

<!-- SCREEN 3 -->

<div class="screen" id="screen3">

  <div class="section-label">
    比較
  </div>

  <div class="compare-table">
    <div class="ct-grid" id="compare-grid"></div>
  </div>

  <div class="section-label">
    AIおすすめ
  </div>

  <div class="result-card">

    <span class="result-badge">
      AI推薦
    </span>

    <div class="result-name" id="rec-name"></div>

    <div class="result-reason" id="rec-reason"></div>

  </div>

</div>

</div>

<script>

let racketDB = [];

async function loadRacketDB(){

  try{

    const res = await fetch('./rackets.json');

    if(!res.ok){
      throw new Error('rackets.json 読み込み失敗');
    }

    racketDB = await res.json();

    console.log('DB loaded', racketDB);

  }catch(err){

    console.error(err);

  }
}

let shaft = 'hard';
let bal = 'even';
let weight = '4U';

let rackets = [];
let analysisResults = {};

let currentRacketIdx = 0;

const uploadedRackets = new Set();

const shaftLabels = {
  soft:'やわらかめ',
  mid:'ふつう',
  hard:'かたい'
};

const balLabels = {
  head:'ヘッドヘビー',
  even:'イーブン',
  handle:'ハンドルヘビー'
};

const weightLabels = {
  '2U':'2U',
  '3U':'3U',
  '4U':'4U',
  '5U':'5U'
};

function escapeHTML(str){

  return str.replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[m]));
}

function goStep(n){

  if(n === 2 && rackets.length === 0){
    alert('先にラケットを登録してください');
    return;
  }

  for(let i=1;i<=3;i++){
    document.getElementById(`screen${i}`).classList.remove('active');
  }

  document.getElementById(`screen${n}`).classList.add('active');

  updateStepUI(n);

  if(n === 2){
    initAnalysisScreen();
  }

  if(n === 3){
    renderCompare();
  }
}

function updateStepUI(n){

  for(let i=1;i<=3;i++){

    const sc = document.getElementById(`sc${i}`);
    const sl = document.getElementById(`sl${i}`);

    sc.className = 'step-circle';
    sl.className = 'step-label';

    if(i < n){

      sc.classList.add('done');
      sc.innerHTML = '<i class="ti ti-check"></i>';

      sl.classList.add('done');

    }else if(i === n){

      sc.classList.add('active');
      sc.textContent = i;

      sl.classList.add('active');

    }else{

      sc.textContent = i;
    }
  }

  for(let i=1;i<=2;i++){

    document.getElementById(`line${i}`)
      .className = i < n ? 'step-line done' : 'step-line';
  }
}

function selectShaft(v){

  shaft = v;

  ['soft','mid','hard'].forEach(s => {
    document.getElementById(`shaft-${s}`)
      .classList.toggle('selected', s === v);
  });

  updatePreview();
}

function selectBal(v){

  bal = v;

  ['head','even','handle'].forEach(b => {
    document.getElementById(`bal-${b}`)
      .classList.toggle('selected', b === v);
  });

  updatePreview();
}

function selectWeight(v){

  weight = v;

  ['2U','3U','4U','5U'].forEach(w => {
    document.getElementById(`w${w}`)
      .classList.toggle('selected', w === v);
  });

  updatePreview();
}

function updatePreview(){

  const name = document.getElementById('rname').value.trim();

  document.getElementById('prev-name').textContent =
    name || '未入力';

  document.getElementById('prev-shaft').innerHTML =
    `<span class="tag tag-purple">${shaftLabels[shaft]}</span>`;

  document.getElementById('prev-bal').innerHTML =
    `<span class="tag tag-green">${balLabels[bal]}</span>`;

  document.getElementById('prev-weight').innerHTML =
    `<span class="tag tag-amber">${weightLabels[weight]}</span>`;
}

function handleNameInput(){

  updatePreview();

  const inputName =
    document.getElementById('rname')
      .value
      .trim()
      .toLowerCase();

  if(!inputName) return;

  const found = racketDB.find(r =>
    r.name.toLowerCase() === inputName
  );

  if(found){
    autoFillRacket(found);
  }
}

function autoFillRacket(data){

  selectShaft(data.shaft);
  selectBal(data.bal);
  selectWeight(data.weight);
}

function addRacket(){

  const input =
    document.getElementById('rname');

  const name = input.value.trim();

  if(!name){
    input.focus();
    return;
  }

  rackets.push({
    name,
    shaft,
    bal,
    weight
  });

  renderRegList();

  input.value = '';

  updatePreview();

  document.getElementById('goto-step2')
    .style.display = 'block';
}

function removeRacket(i){

  rackets.splice(i,1);

  renderRegList();

  if(rackets.length === 0){

    document.getElementById('goto-step2')
      .style.display = 'none';
  }
}

function renderRegList(){

  const section =
    document.getElementById('reg-section');

  const list =
    document.getElementById('reg-list');

  section.style.display =
    rackets.length ? 'block' : 'none';

  list.innerHTML = rackets.map((r,i)=>`

    <div class="reg-card">

      <div class="reg-icon">
        <i class="ti ti-tournament"></i>
      </div>

      <div style="flex:1">

        <div>
          ${escapeHTML(r.name)}
        </div>

        <div style="margin-top:4px">

          <span class="tag tag-purple">
            ${shaftLabels[r.shaft]}
          </span>

          <span class="tag tag-green">
            ${balLabels[r.bal]}
          </span>

          <span class="tag tag-amber">
            ${weightLabels[r.weight]}
          </span>

        </div>

      </div>

      <button class="reg-del"
      onclick="removeRacket(${i})">
        ×
      </button>

    </div>

  `).join('');
}

function initAnalysisScreen(){

  currentRacketIdx = 0;

  renderTabs();

  loadRacketPanel(currentRacketIdx);
}

function renderTabs(){

  const container =
    document.getElementById('racket-tabs');

  container.innerHTML =
    rackets.map((r,i)=>{

      const done = analysisResults[i];

      return `
        <span
          class="rtab ${i===currentRacketIdx?'active':''} ${done?'done-tab':''}"
          onclick="switchRacket(${i})"
        >
          ${escapeHTML(r.name)}
        </span>
      `;
    }).join('');
}

function switchRacket(idx){

  currentRacketIdx = idx;

  renderTabs();

  loadRacketPanel(idx);
}

function loadRacketPanel(idx){

  const r = rackets[idx];

  document.getElementById('upload-label')
    .textContent =
      `${r.name} の動画をアップロード`;

  const uploaded =
    uploadedRackets.has(idx);

  document.getElementById('upload-area')
    .style.display =
      uploaded ? 'none' : 'block';

  document.getElementById('vcard')
    .style.display =
      uploaded ? 'block' : 'none';

  document.getElementById('vcard-name')
    .textContent =
      `${r.name}.mp4`;

  document.getElementById('analyze-btn')
    .disabled = !uploaded;

  if(analysisResults[idx]){

    renderResult(idx);

  }else{

    document.getElementById('result-panel')
      .style.display = 'none';
  }
}

function simulateUpload(){

  uploadedRackets.add(currentRacketIdx);

  document.getElementById('upload-area')
    .style.display = 'none';

  document.getElementById('vcard')
    .style.display = 'block';

  document.getElementById('analyze-btn')
    .disabled = false;
}

function startAnalysis(){

  document.getElementById('lbox')
    .style.display = 'flex';

  const steps = ['ls1','ls2','ls3','ls4'];

  let idx = 0;

  const timer = setInterval(()=>{

    if(idx > 0){

      document.getElementById(steps[idx-1])
        .className = 'lstep done';
    }

    if(idx < steps.length){

      document.getElementById(steps[idx])
        .className = 'lstep active';

      idx++;

    }else{

      clearInterval(timer);

      analysisResults[currentRacketIdx] = {
        total: Math.floor(75 + Math.random()*20),
        speed: Math.floor(75 + Math.random()*20),
        stable: Math.floor(75 + Math.random()*20)
      };

      document.getElementById('lbox')
        .style.display = 'none';

      renderResult(currentRacketIdx);

      renderTabs();
    }

  },700);
}

function renderResult(idx){

  const s = analysisResults[idx];

  document.getElementById('rs-total')
    .textContent = s.total;

  document.getElementById('rs-speed')
    .textContent = `${s.speed}`;

  document.getElementById('rs-stable')
    .textContent = s.stable;

  document.getElementById('fb-list').innerHTML = `

    <div class="fb">

      <div class="fb-dot fb-dot-g"></div>

      <div>
        <div>打点が安定しています</div>
      </div>

    </div>

    <div class="fb">

      <div class="fb-dot fb-dot-o"></div>

      <div>
        <div>肘の引きが浅いです</div>
      </div>

    </div>

  `;

  document.getElementById('result-panel')
    .style.display = 'block';
}

function nextRacket(){

  const next =
    rackets.findIndex((_,i)=>
      !analysisResults[i]
    );

  if(next !== -1){

    switchRacket(next);

  }else{

    goStep(3);
  }
}

function renderCompare(){

  const grid =
    document.getElementById('compare-grid');

  const keys =
    Object.keys(analysisResults);

  if(keys.length === 0){

    grid.innerHTML =
      '分析結果なし';

    return;
  }

  let html = '<div></div>';

  keys.forEach(idx => {

    html += `
      <div class="ct-head">
        ${escapeHTML(rackets[idx].name)}
      </div>
    `;
  });

  const metrics = [
    ['total','総合'],
    ['speed','速度'],
    ['stable','安定性']
  ];

  metrics.forEach(([key,label])=>{

    html += `
      <div class="ct-label">
        ${label}
      </div>
    `;

    keys.forEach((idx,i)=>{

      const val =
        analysisResults[idx][key];

      html += `
        <div>

          <div class="ct-val">
            ${val}
          </div>

          <div class="bar-wrap">
            <div
              class="bar ${['ba','bb','bc'][i%3]}"
              style="width:${val}%"
            ></div>
          </div>

        </div>
      `;
    });
  });

  grid.innerHTML = html;

  const bestIdx =
    keys.reduce((a,b)=>
      analysisResults[a].total >
      analysisResults[b].total
      ? a : b
    );

  const best = rackets[bestIdx];

  document.getElementById('rec-name')
    .textContent = best.name;

  document.getElementById('rec-reason')
    .textContent =
      `${shaftLabels[best.shaft]}シャフトと${balLabels[best.bal]}の組み合わせが現在のフォームに最も適しています。`;
}

loadRacketDB();

updatePreview();

</script>

</body>
</html>
